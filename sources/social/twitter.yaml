# Twitter(X) 社媒监控（平台级单信源）
# 通过 twitterapi.io API 爬取 AI KOL / 投资人 / 实验室与公司账号内容
# 需要配置: TWITTER_API_KEY, TWITTER_API_PROXY (在 .env 中)

defaults:
  schedule: "cron"
  is_enabled: true
  tags: ["twitter", "social", "kol"]

sources:
  - id: twitter_ai_kol_international
    name: "Twitter"
    dimension: technology
    group: social_platform
    crawler_class: twitter_kol

    # 调度（完全 YAML 可配）
    schedule: "cron"
    cron:
      hour: 4
      minute: 0
      timezone: "Asia/Shanghai"

    is_enabled: true
    tags: ["twitter", "social", "kol", "platform"]

    # 抓取配置（完全 YAML 可配）
    twitter_accounts_file: "twitter_kol_accounts.yaml"
    crawl_accounts_cohort: "all"  # core | expansion | all
    max_tweets_per_account: 3       # 每账号抓取帖子数
    include_replies: true           # 是否包含回复信息
    max_replies_per_post: 5         # 每帖最多保留回复数（写入 social_posts.top_replies）

    # crawler article 流程的过滤阈值
    min_likes: 100
    fetch_profiles: true

dimension: "paper"
dimension_name: "论文主数据"
description: "AI 顶刊顶会论文主表信源，面向平台级论文仓。默认抓取近三年口径，不限 topic，但部分 venue 保留 track 口径。"

default_keyword_filter: []
default_keyword_blacklist: []

paper_defaults: &paper_defaults
  crawl_method: "static"
  schedule: "daily"
  priority: 1
  is_enabled: false
  persist_to_db: true
  entity_family: "paper_record"
  request_timeout: 30
  max_retries: 2
  request_delay: 0.2
  group: "paper_warehouse"

enrichment_profiles:
  openreview_profile: &enrich_openreview_profile
    primary_methods: ["openreview_note", "openreview_profile", "openalex"]
    fallback_methods: ["arxiv_by_id"]
    fields: ["authors", "abstract", "affiliations", "author_descriptions", "author_experiences", "profile_flags"]
    qps:
      openreview: 0.8
      openalex: 3.0
    notes: "OpenReview profile 是机构和作者画像主路径；剩余缺口多为 profile 自身缺字段。"
  cvf_pdf: &enrich_cvf_pdf
    primary_methods: ["official_html", "openalex"]
    fallback_methods: ["pdf_first_page", "arxiv_by_id"]
    fields: ["authors", "abstract", "affiliations", "doi", "arxiv_id"]
    qps:
      html_per_host: 0.5
      pdf_per_host: 0.15
      openalex: 3.0
    notes: "CVF HTML 补作者/摘要/arXiv；机构主要靠 OpenAlex 和 PDF 首页兜底。"
  acl_pdf: &enrich_acl_pdf
    primary_methods: ["official_html"]
    fallback_methods: ["pdf_first_page", "openalex"]
    fields: ["authors", "abstract", "affiliations", "doi"]
    qps:
      html_per_host: 0.5
      pdf_per_host: 0.15
      openalex: 3.0
    notes: "ACL Anthology HTML 补作者/摘要/DOI/PDF；机构主要靠 PDF 首页。"
  proceedings_pdf: &enrich_proceedings_pdf
    primary_methods: ["official_html", "openalex"]
    fallback_methods: ["pdf_first_page", "arxiv_by_id"]
    fields: ["authors", "abstract", "affiliations", "doi", "arxiv_id"]
    qps:
      html_per_host: 0.5
      pdf_per_host: 0.15
      openalex: 3.0
    notes: "会议官网详情页补基础元数据；机构缺口用 PDF 首页兜底。"
  ojs_openalex: &enrich_ojs_openalex
    primary_methods: ["official_html", "openalex"]
    fallback_methods: ["pdf_first_page"]
    fields: ["authors", "abstract", "affiliations", "doi"]
    qps:
      html_per_host: 0.3
      pdf_per_host: 0.15
      openalex: 3.0
    notes: "OJS 页面较敏感，HTML/PDF 低速；AAAI 机构已接近满覆盖。"
  journal_pdf: &enrich_journal_pdf
    primary_methods: ["official_html", "openalex"]
    fallback_methods: ["pdf_first_page"]
    fields: ["authors", "abstract", "affiliations", "doi"]
    qps:
      html_per_host: 0.3
      pdf_per_host: 0.1
      openalex: 3.0
    notes: "期刊 PDF 首页通常可补机构；JAIR 部分 PDF URL 返回 HTML 包装页，需单独适配下载链接。"

sources:
  - <<: *paper_defaults
    id: "jmlr"
    name: "JMLR Papers"
    source_type: "raw_official"
    crawler_class: "jmlr_papers"
    venue: "JMLR"
    venue_full: "Journal of Machine Learning Research"
    track_label: "Journal Article"
    year_configs:
      - year: 2023
        volume: 24
      - year: 2024
        volume: 25
      - year: 2025
        volume: 26
    tags: ["paper", "warehouse", "jmlr", "journal", "ml"]
    enrichment: *enrich_journal_pdf

  - <<: *paper_defaults
    id: "jair"
    name: "JAIR Papers"

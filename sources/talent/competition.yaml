dimension: "talent_scout"
dimension_name: "人才候选池"
description: "潜在引入人才的竞赛信号源，仅用于手动任务导出 Excel。"

default_keyword_filter: []
default_keyword_blacklist: []

competition_defaults: &competition_defaults
  crawl_method: "static"
  schedule: "daily"
  priority: 1
  is_enabled: false
  crawler_class: "competition_source"
  entity_family: "competition"
  fallback_mode: "evidence_only"
  persist_to_db: false
  request_timeout: 8
  max_retries: 1
  request_delay: 0.1

evidence_competition_defaults: &evidence_competition_defaults
  crawl_method: "static"
  schedule: "daily"
  priority: 1
  is_enabled: false
  crawler_class: "evidence_only_source"
  entity_family: "competition"
  capture_mode: "evidence_only"
  fallback_mode: "evidence_only"
  persist_to_db: false
  request_timeout: 8
  max_retries: 1
  request_delay: 0.1


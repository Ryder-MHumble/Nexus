      title: "a"
      link: "a"
      date: "span"
      date_format: "%Y-%m-%d"
    base_url: "https://kw.beijing.gov.cn"
    detail_selectors:
      content: "div.TRS_UEDITOR"
    tags: ["policy", "bjkw", "science"]


dimension: "beijing_policy"
dimension_name: "对北京"
description: "北京市政策文件、市领导动态、委办局人事变动"

# ─────────────────────────────────────────────────────────────────
# FILTERING OPTIONS:
# See sources/README.md for detailed filtering guide
#
# Recommended: Use domain_filter for consistent classification
#   domain_filter: "technology.ai"  # or "economy.finance", etc.
#
# Alternative: Custom keywords for region-specific needs
#   keyword_filter: ["科技", "创新", "人才"]
#   keyword_blacklist: ["供水", "绿化"]
# ─────────────────────────────────────────────────────────────────

# Legacy: Dimension-level defaults (consider migrating to source-level domain_filter)
default_keyword_filter:
  - "教育"
  - "科技"
  - "人工智能"
  - "AI"
  - "人才"
  - "中关村"  # Region-specific (replace with your target region)
  - "海淀"    # Region-specific
  - "创新"
  - "数字经济"
  - "智能"
  - "数据"
  - "高精尖"
  - "芯片"
  - "机器人"
  - "算力"
  - "软件"
  - "信息化"
  - "数字"
  - "高新"

default_keyword_blacklist:
  - "供水"
  - "用水"
  - "排水"
  - "停水"
  - "防汛"
  - "防灾"
  - "卫生许可"
  - "消防检查"
  - "食品安全"
  - "租赁"
  - "住房公积金"
  - "婚姻登记"
  - "道路施工"
  - "绿化"
  - "环卫"
  - "垃圾"
  - "农业补贴"
  - "粮食"
  - "畜牧"
  - "基层选举"
  - "居委会"


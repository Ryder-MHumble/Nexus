# 领域配置文件
# 支持多级分类：一级领域 → 二级子领域
# 用于灵活过滤不同业务关注的信息

domains:
  # ============ 科技类 ============
  technology:
    name: "科技"
    description: "科技创新、技术发展"
    subdomains:
      ai:
        name: "人工智能"
        keywords:
          - "人工智能"
          - "AI"
          - "机器学习"
          - "深度学习"
          - "大模型"
          - "算法"
          - "神经网络"
          - "智能"
          - "ChatGPT"
          - "LLM"
          - "AGI"
          - "自然语言处理"
          - "NLP"
          - "计算机视觉"
          - "语音识别"
          - "强化学习"

      biotech:
        name: "生物科技"

  # ============ 特殊领域 ============
  all:
    name: "全领域"
    description: "不进行关键词过滤"
    keywords: []  # 空列表表示不过滤

# 领域组合（预设常用组合）
domain_groups:
  tech_all:
    name: "全科技"
    description: "所有科技子领域"
    domains:
      - "technology.ai"
      - "technology.biotech"
      - "technology.quantum"
      - "technology.semiconductor"
      - "technology.aerospace"
      - "technology.energy"

  economy_all:
    name: "全经济"
    description: "所有经济子领域"
    domains:
      - "economy.finance"
      - "economy.industry"
      - "economy.trade"
      - "economy.realestate"

  livelihood_all:
    name: "全民生"
    description: "所有民生子领域"
    domains:
      - "livelihood.education"
      - "livelihood.healthcare"
      - "livelihood.employment"
      - "livelihood.housing"
      - "livelihood.transportation"

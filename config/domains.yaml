          - "生物技术"
          - "基因"
          - "蛋白质"
          - "细胞"
          - "医药"
          - "临床"
          - "疫苗"
          - "基因编辑"
          - "CRISPR"
          - "干细胞"
          - "生物制药"

      quantum:
